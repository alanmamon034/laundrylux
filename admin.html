<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaundryLux — Admin</title>
<style>
  :root {
    --dark: #1A1A2E; --dark2: #16213E; --accent: #2563EB; --amber: #F59E0B;
    --off-white: #F8F6F1; --muted: #6B7280; --border: #E5E3DE; --card-bg: #FFFFFF;
    --green: #10B981; --red: #EF4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--off-white); color: var(--dark); min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--dark); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 60px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .nav-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  .nav-logo span { color: var(--accent); }
  .nav-badge { background: var(--amber); color: var(--dark); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-left: 10px; }

  .page { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.amber { color: var(--amber); }
  .stat-card .value.blue { color: var(--accent); }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .toolbar h2 { font-size: 20px; font-weight: 700; }
  .filter-tabs { display: flex; gap: 6px; }
  .tab { padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--dark); cursor: pointer; transition: all 0.15s; }
  .tab.active, .tab:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
  .clear-btn { font-size: 12px; color: var(--red); border: 1.5px solid var(--red); background: none; padding: 5px 14px; border-radius: 999px; cursor: pointer; font-weight: 600; }
  .clear-btn:hover { background: #FEE2E2; }

  .orders-table { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .table-head { display: grid; grid-template-columns: 120px 1fr 1fr 100px 110px 110px; gap: 12px; padding: 12px 20px; background: var(--off-white); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  .order-row { display: grid; grid-template-columns: 120px 1fr 1fr 100px 110px 110px; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.1s; }
  .order-row:last-child { border-bottom: none; }
  .order-row:hover { background: #FAFAF8; }

  .ref { font-size: 12px; font-weight: 700; color: var(--accent); font-family: monospace; }
  .customer-name { font-size: 14px; font-weight: 600; }
  .customer-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .product-name { font-size: 13px; font-weight: 500; }
  .product-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .amount { font-size: 15px; font-weight: 700; }
  .method { font-size: 12px; color: var(--muted); font-weight: 500; }

  .status-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border: none; font-family: inherit; }
  .status-pending  { background: #FEF3C7; color: #92400E; }
  .status-confirmed { background: #D1FAE5; color: #065F46; }
  .status-shipped  { background: #DBEAFE; color: #1E40AF; }
  .status-cancelled { background: #FEE2E2; color: #991B1B; }

  .action-btn { background: var(--accent); color: #fff; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .action-btn:hover { opacity: 0.85; }

  .empty { text-align: center; padding: 72px 24px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }
  .empty small { font-size: 13px; color: #9CA3AF; margin-top: 6px; display: block; }

  /* Detail modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 94%; max-width: 480px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-head { background: var(--dark); color: #fff; padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 22px; }
  .detail-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .dk { color: var(--muted); font-weight: 500; }
  .detail-row .dv { font-weight: 600; text-align: right; max-width: 240px; word-break: break-word; }
  .modal-actions { display: flex; gap: 10px; padding: 0 22px 22px; flex-wrap: wrap; }
  .modal-actions button { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; min-width: 100px; }
  .btn-confirm { background: var(--green); color: #fff; }
  .btn-ship { background: var(--accent); color: #fff; }
  .btn-cancel { background: #FEE2E2; color: var(--red); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark); color: #fff; padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 500; transition: transform 0.3s; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .table-head, .order-row { grid-template-columns: 100px 1fr 80px 90px; }
    .table-head > :nth-child(3), .order-row > :nth-child(3),
    .table-head > :nth-child(5), .order-row > :nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center">
    <span class="nav-logo">Laundry<span>Lux</span></span>
    <span class="nav-badge" id="pending-badge">0 pending</span>
  </div>
  <a href="index.html" style="color:rgba(255,255,255,0.6);font-size:13px;text-decoration:none">← Back to store</a>
</nav>

<div class="page">
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="label">Total Orders</div><div class="value blue" id="stat-total">0</div></div>
    <div class="stat-card"><div class="label">Pending</div><div class="value amber" id="stat-pending">0</div></div>
    <div class="stat-card"><div class="label">Confirmed</div><div class="value green" id="stat-confirmed">0</div></div>
    <div class="stat-card"><div class="label">Revenue</div><div class="value blue" id="stat-revenue">$0</div></div>
  </div>

  <div class="toolbar">
    <h2>Orders</h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all',this)">All</button>
        <button class="tab" onclick="setFilter('pending',this)">Pending</button>
        <button class="tab" onclick="setFilter('confirmed',this)">Confirmed</button>
        <button class="tab" onclick="setFilter('shipped',this)">Shipped</button>
      </div>
      <button class="clear-btn" onclick="clearOrders()">Clear All</button>
    </div>
  </div>

  <div class="orders-table">
    <div class="table-head">
      <div>Ref</div>
      <div>Customer</div>
      <div>Product</div>
      <div>Amount</div>
      <div>Payment</div>
      <div>Status</div>
    </div>
    <div id="orders-body"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-ref">Order Details</h3>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let orders = [];
let filter = 'all';
let activeOrderIdx = null;

const STATUS_CYCLE = ['pending', 'confirmed', 'shipped', 'cancelled'];

function load() {
  orders = JSON.parse(localStorage.getItem('ll_orders') || '[]');
  // sort newest first
  orders.sort((a, b) => b.createdAt - a.createdAt);
  render();
  updateStats();
}

function save() {
  localStorage.setItem('ll_orders', JSON.stringify(orders));
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const body = document.getElementById('orders-body');
  const visible = filter === 'all' ? orders : orders.filter(o => o.status === filter);

  if (visible.length === 0) {
    body.innerHTML = `<div class="empty"><div class="icon">📭</div><p>No ${filter === 'all' ? '' : filter + ' '}orders yet.</p><small>Orders placed on the store will appear here.</small></div>`;
    return;
  }

  body.innerHTML = visible.map((o, vi) => {
    const i = orders.indexOf(o);
    const date = new Date(o.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
    <div class="order-row" onclick="openModal(${i})">
      <div>
        <div class="ref">${o.ref || '#' + o.id}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${date}</div>
      </div>
      <div>
        <div class="customer-name">${esc(o.customerName)}</div>
        <div class="customer-sub">${esc(o.customerPhone)}</div>
      </div>
      <div>
        <div class="product-name">${esc(o.productName)}</div>
        <div class="product-sub">${esc(o.deliveryArea || '')}</div>
      </div>
      <div class="amount">$${o.amount}</div>
      <div class="method">${esc(o.paymentMethod || '—')}</div>
      <div>
        <span class="status-badge status-${o.status}" onclick="cycleStatus(event,${i})">${o.status}</span>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  const total = orders.length;
  const pending = orders.filter(o => o.status === 'pending').length;
  const confirmed = orders.filter(o => o.status === 'confirmed').length;
  const revenue = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + Number(o.amount || 0), 0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-confirmed').textContent = confirmed;
  document.getElementById('stat-revenue').textContent = '$' + revenue.toLocaleString();
  document.getElementById('pending-badge').textContent = pending + ' pending';
}

function cycleStatus(e, i) {
  e.stopPropagation();
  const cur = STATUS_CYCLE.indexOf(orders[i].status);
  orders[i].status = STATUS_CYCLE[(cur + 1) % STATUS_CYCLE.length];
  save();
  render();
  updateStats();
  showToast('Status updated to ' + orders[i].status);
}

function openModal(i) {
  activeOrderIdx = i;
  const o = orders[i];
  document.getElementById('modal-ref').textContent = o.ref || 'Order #' + o.id;
  const date = new Date(o.createdAt).toLocaleString();
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-row"><span class="dk">Customer</span><span class="dv">${esc(o.customerName)}</span></div>
    <div class="detail-row"><span class="dk">Phone</span><span class="dv"><a href="tel:${esc(o.customerPhone)}">${esc(o.customerPhone)}</a></span></div>
    <div class="detail-row"><span class="dk">Email</span><span class="dv"><a href="mailto:${esc(o.customerEmail)}">${esc(o.customerEmail)}</a></span></div>
    <div class="detail-row"><span class="dk">Product</span><span class="dv">${esc(o.productName)}</span></div>
    <div class="detail-row"><span class="dk">Amount</span><span class="dv">$${o.amount} USD</span></div>
    <div class="detail-row"><span class="dk">Payment</span><span class="dv">${esc(o.paymentMethod || '—')}</span></div>
    <div class="detail-row"><span class="dk">Delivery address</span><span class="dv">${esc(o.deliveryAddress || '—')}</span></div>
    <div class="detail-row"><span class="dk">Status</span><span class="dv"><span class="status-badge status-${o.status}">${o.status}</span></span></div>
    <div class="detail-row"><span class="dk">Placed at</span><span class="dv">${date}</span></div>
  `;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn-confirm" onclick="setStatus(${i},'confirmed')">✓ Confirm</button>
    <button class="btn-ship" onclick="setStatus(${i},'shipped')">🚚 Shipped</button>
    <button class="btn-cancel" onclick="setStatus(${i},'cancelled')">✕ Cancel</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function setStatus(i, status) {
  orders[i].status = status;
  save();
  render();
  updateStats();
  closeModal();
  showToast('Order marked as ' + status);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function clearOrders() {
  if (!confirm('Delete all orders? This cannot be undone.')) return;
  localStorage.removeItem('ll_orders');
  orders = [];
  render();
  updateStats();
  showToast('All orders cleared.');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Auto-refresh every 5s in case store tab is open simultaneously
setInterval(load, 5000);
load();
</script>
</body>
</html>
