<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaundryLux — Admin</title>
<style>
  :root {
    --dark: #1A1A2E; --dark2: #16213E; --accent: #2563EB; --amber: #F59E0B;
    --off-white: #F8F6F1; --muted: #6B7280; --border: #E5E3DE; --card: #FFFFFF;
    --green: #10B981; --red: #EF4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--off-white); color: var(--dark); height: 100vh; display: flex; flex-direction: column; }

  nav { background: var(--dark); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 58px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .nav-logo { font-size: 18px; font-weight: 700; color: #fff; }
  .nav-logo span { color: var(--accent); }
  .badge { background: var(--amber); color: var(--dark); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .fb-status { font-size: 12px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 6px; }
  .fb-dot { width: 8px; height: 8px; border-radius: 50%; background: #6B7280; }
  .fb-dot.connected { background: var(--green); }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--card); display: flex; flex-direction: column; }
  .sidebar-head { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-head h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .ftab { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: none; color: var(--dark); cursor: pointer; }
  .ftab.active { background: var(--dark); color: #fff; border-color: var(--dark); }
  .orders-list { flex: 1; overflow-y: auto; }
  .order-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .order-item:hover { background: var(--off-white); }
  .order-item.active { background: #EFF6FF; border-left: 3px solid var(--accent); }
  .oi-ref { font-size: 11px; font-weight: 700; color: var(--accent); font-family: monospace; margin-bottom: 3px; }
  .oi-name { font-size: 14px; font-weight: 600; }
  .oi-product { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .oi-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .oi-amount { font-size: 13px; font-weight: 700; }
  .status-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
  .sp-pending   { background: #FEF3C7; color: #92400E; }
  .sp-confirmed { background: #D1FAE5; color: #065F46; }
  .sp-shipped   { background: #DBEAFE; color: #1E40AF; }
  .sp-cancelled { background: #FEE2E2; color: #991B1B; }
  .empty-orders { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .no-selection { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--muted); }
  .no-selection .icon { font-size: 48px; }
  .no-selection p { font-size: 14px; }

  .order-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .order-detail { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 18px; flex-shrink: 0; }
  .od-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .od-ref { font-size: 12px; font-weight: 800; color: var(--accent); font-family: monospace; }
  .od-name { font-size: 15px; font-weight: 700; }
  .od-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .od-field .od-label { font-size: 11px; color: var(--muted); font-weight: 500; }
  .od-field .od-value { font-size: 13px; font-weight: 600; }
  .od-field a { color: var(--accent); text-decoration: none; }
  .status-actions { display: flex; gap: 7px; flex-wrap: wrap; }
  .sa-btn { padding: 6px 13px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
  .sa-confirm { background: var(--green); color: #fff; }
  .sa-ship    { background: var(--accent); color: #fff; }
  .sa-cancel  { background: #FEE2E2; color: var(--red); }

  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #F9F8F5; }
  .chat-head { padding: 9px 18px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); background: var(--card); flex-shrink: 0; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg-wrap { display: flex; flex-direction: column; }
  .msg-wrap.customer { align-items: flex-end; }
  .msg-wrap.admin    { align-items: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 78%; line-height: 1.5; word-break: break-word; }
  .msg-wrap.customer .msg-bubble { background: #4F46E5; color: #fff; border-radius: 14px 14px 4px 14px; }
  .msg-wrap.admin    .msg-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .chat-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--card); flex-shrink: 0; }
  .chat-input-row textarea { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; resize: none; outline: none; height: 42px; }
  .chat-input-row textarea:focus { border-color: var(--accent); }
  .send-btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0 18px; font-size: 13px; font-weight: 600; cursor: pointer; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; transition: transform 0.3s; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="nav-logo">Laundry<span>Lux</span></span>
    <span class="badge" id="pending-badge">0 pending</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-status-text">Connecting…</span></div>
    <a href="index.html" style="color:rgba(255,255,255,0.55);font-size:12px;text-decoration:none">← Store</a>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>Orders</h2>
      <div class="filter-row">
        <button class="ftab active" onclick="setFilter('all',this)">All</button>
        <button class="ftab" onclick="setFilter('pending',this)">Pending</button>
        <button class="ftab" onclick="setFilter('confirmed',this)">Confirmed</button>
        <button class="ftab" onclick="setFilter('shipped',this)">Shipped</button>
      </div>
    </div>
    <div class="orders-list" id="orders-list">
      <div class="empty-orders">No orders yet.</div>
    </div>
  </div>

  <div class="main">
    <div class="no-selection" id="no-selection">
      <div class="icon">💬</div>
      <p>Select an order to chat</p>
    </div>
    <div class="order-panel" id="order-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="order-detail" id="order-detail"></div>
      <div class="chat-area">
        <div class="chat-head">Customer chat — replies appear instantly</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <textarea id="admin-input" placeholder="Type a reply… (Enter to send)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAdminMsg();}"></textarea>
          <button class="send-btn" onclick="sendAdminMsg()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onChildAdded, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAgqZWNc1f-wRufI7xdezh5rxrY5eT9_kw",
  authDomain: "laundrylux-f47d7.firebaseapp.com",
  databaseURL: "https://laundrylux-f47d7-default-rtdb.firebaseio.com",
  projectId: "laundrylux-f47d7",
  storageBucket: "laundrylux-f47d7.firebasestorage.app",
  messagingSenderId: "347247627395",
  appId: "1:347247627395:web:7081b69ec59875338edfb6"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

onValue(ref(db, '.info/connected'), (snap) => {
  const ok = snap.val();
  document.getElementById('fb-dot').className = 'fb-dot' + (ok ? ' connected' : '');
  document.getElementById('fb-status-text').textContent = ok ? 'Live' : 'Reconnecting…';
});

window._fbDb  = db;
window._fbFns = { ref, push, onChildAdded };
window._adminBoot();
</script>

<script>
let orders = [], filter = 'all', activeRef = null, chatUnsub = null;

window._adminBoot = function() {
  loadOrders();
  setInterval(pollOrders, 3000);
};

function loadOrders() {
  orders = JSON.parse(localStorage.getItem('ll_orders') || '[]');
  orders.sort((a,b) => b.createdAt - a.createdAt);
  renderList();
  updateBadge();
}

function pollOrders() {
  const fresh = JSON.parse(localStorage.getItem('ll_orders') || '[]');
  if (fresh.length !== orders.length) {
    const prevLen = orders.length;
    orders = fresh.sort((a,b) => b.createdAt - a.createdAt);
    renderList();
    updateBadge();
    if (fresh.length > prevLen) showToast('New order received!');
  }
}

function saveOrders() { localStorage.setItem('ll_orders', JSON.stringify(orders)); }

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('orders-list');
  const vis = filter === 'all' ? orders : orders.filter(o => o.status === filter);
  if (!vis.length) { list.innerHTML = '<div class="empty-orders">No ' + (filter==='all'?'':filter+' ') + 'orders yet.</div>'; return; }
  list.innerHTML = vis.map(o => `
    <div class="order-item${activeRef===o.ref?' active':''}" onclick="selectOrder('${esc(o.ref)}')">
      <div class="oi-ref">${esc(o.ref)}</div>
      <div class="oi-name">${esc(o.customerName)}</div>
      <div class="oi-product">${esc(o.productName)}</div>
      <div class="oi-meta">
        <span class="oi-amount">$${o.amount}</span>
        <span class="status-pill sp-${o.status}">${o.status}</span>
      </div>
    </div>`).join('');
}

function updateBadge() {
  document.getElementById('pending-badge').textContent = orders.filter(o=>o.status==='pending').length + ' pending';
}

function selectOrder(ref) {
  activeRef = ref;
  renderList();
  const o = orders.find(x => x.ref === ref);
  if (!o) return;

  document.getElementById('no-selection').style.display = 'none';
  const panel = document.getElementById('order-panel');
  panel.style.display = 'flex';

  document.getElementById('order-detail').innerHTML = `
    <div class="od-top">
      <div><div class="od-ref">${esc(o.ref)}</div><div class="od-name">${esc(o.customerName)}</div></div>
      <div class="status-actions">
        <button class="sa-btn sa-confirm" onclick="setStatus('${esc(o.ref)}','confirmed')">✓ Confirm</button>
        <button class="sa-btn sa-ship"    onclick="setStatus('${esc(o.ref)}','shipped')">🚚 Shipped</button>
        <button class="sa-btn sa-cancel"  onclick="setStatus('${esc(o.ref)}','cancelled')">✕ Cancel</button>
      </div>
    </div>
    <div class="od-grid">
      <div class="od-field"><div class="od-label">Product</div><div class="od-value">${esc(o.productName)}</div></div>
      <div class="od-field"><div class="od-label">Amount</div><div class="od-value">$${o.amount} USD</div></div>
      <div class="od-field"><div class="od-label">Payment</div><div class="od-value">${esc(o.paymentMethod||'—')}</div></div>
      <div class="od-field"><div class="od-label">Phone</div><div class="od-value"><a href="tel:${esc(o.customerPhone)}">${esc(o.customerPhone)}</a></div></div>
      <div class="od-field"><div class="od-label">Email</div><div class="od-value"><a href="mailto:${esc(o.customerEmail)}">${esc(o.customerEmail)}</a></div></div>
      <div class="od-field"><div class="od-label">Address</div><div class="od-value">${esc(o.deliveryAddress||'—')}</div></div>
    </div>`;

  loadChat(o.ref);
}

function loadChat(roomId) {
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';

  const db = window._fbDb;
  if (!db) return;
  const { ref, onChildAdded } = window._fbFns;

  onChildAdded(ref(db, 'chats/' + roomId + '/messages'), (snap) => {
    const msg = snap.val();
    if (msg && activeRef === roomId) appendMsg(msg.role, msg.text, msg.time);
  });
}

function appendMsg(role, text, time) {
  const msgs = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (role === 'admin' ? 'admin' : 'customer');
  const t = time || new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  wrap.innerHTML = `<div class="msg-bubble">${esc(text).replace(/\n/g,'<br>')}</div><div class="msg-time">${t}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendAdminMsg() {
  const input = document.getElementById('admin-input');
  const text = input.value.trim();
  if (!text || !activeRef) return;
  input.value = '';

  const db = window._fbDb;
  if (!db) { showToast('Not connected'); return; }
  const { ref, push } = window._fbFns;
  const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  try {
    await push(ref(db, 'chats/' + activeRef + '/messages'), { role:'admin', text, time, ts:Date.now() });
    appendMsg('admin', text, time);
  } catch(e) { showToast('Failed: ' + e.message); }
}

function setStatus(ref, status) {
  const o = orders.find(x => x.ref === ref);
  if (!o) return;
  o.status = status;
  saveOrders();
  renderList();
  updateBadge();
  selectOrder(ref);
  showToast('Marked as ' + status);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
